name: ❓ Question / Support
description: Tirar uma dúvida sobre uso, implementação ou decisões do projeto
title: 'question: '
labels: ['question']
body:
  - type: markdown
    attributes:
      value: |
        <p align="center">
          <a href="https://github.com/Eliezir/apresenta.ai">
            <picture>
              <source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/Eliezir/apresenta.ai/main/assets/logo-dark.png">
              <img src="https://raw.githubusercontent.com/Eliezir/apresenta.ai/main/assets/logo.png" alt="Apresenta.AI" height="100" />
            </picture>
          </a>
        </p>

        <p align="center"><em>Tem uma dúvida? Bora resolver junto.</em></p>

        > [!IMPORTANT]
        > - Se achou um bug, use o **Bug Report** ao invés.
        > - Se quer sugerir feature, use o **Feature Request**.
        > - Busque issues existentes e a documentação antes.
  - type: checkboxes
    id: preliminary
    attributes:
      label: Checks preliminares
      options:
        - label: Busquei issues existentes e a documentação.
          required: true
        - label: Isso é uma dúvida, não um bug ou sugestão de feature.
          required: true
  - type: textarea
    id: question
    attributes:
      label: Sua pergunta
      description: Seja direto — o que você quer entender ou resolver?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: O que você está tentando fazer?
      description: Descreva o objetivo / caso de uso pra gente dar a resposta mais útil.
  - type: textarea
    id: tried
    attributes:
      label: O que você já tentou
      description: Documente o que testou e o resultado. (Opcional)
