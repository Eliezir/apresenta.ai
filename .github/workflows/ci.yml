name: Java CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# Cancela runs anteriores do mesmo branch para economizar os minutos do GitHub Actions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── JOB 1 ──────────────────────────────────────────────────────────────────
  # Formatação primeiro — falha rápida, sem gastar tempo compilando código sujo
  code-style:
    name: "Code Style (Spotless)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Verificar formatação
        run: mvn spotless:check

  # ── JOB 2 ──────────────────────────────────────────────────────────────────
  # Análise estática — só roda se o código já estiver formatado
  static-analysis:
    name: "Análise Estática (SpotBugs + PMD)"
    runs-on: ubuntu-latest
    needs: code-style
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compilar
        run: mvn compile -q

      - name: SpotBugs — detectar bugs no bytecode
        run: mvn spotbugs:check

      - name: PMD — detectar code smells
        run: mvn pmd:check

      - name: Upload relatórios de análise
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-reports
          path: |
            backend/target/spotbugsXml.xml
            backend/target/pmd.xml
          retention-days: 7

  # ── JOB 3 ──────────────────────────────────────────────────────────────────
  # Testes + cobertura — só roda se o código passou na análise estática
  tests:
    name: "Testes + Cobertura (JUnit + Jacoco)"
    runs-on: ubuntu-latest
    needs: static-analysis
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes com cobertura
        run: mvn test -Dspring.profiles.active=test

      - name: Upload relatório Jacoco
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7

      - name: Comentar cobertura no PR
        uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: ${{ github.workspace }}/backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Cobertura de Testes"
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          update-comment: true