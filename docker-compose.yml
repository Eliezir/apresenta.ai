services:
  backend:
    build:
      context: ./backend
    image: apresenta-ia-backend
    container_name: apresenta-ia-backend
    ports:
      - "8080:8080"
    environment:
      PROFILE_ACTIVE: ${PROFILE_ACTIVE:-prod}
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - backend-db:/app/database
    restart: unless-stopped

volumes:
  backend-db:
